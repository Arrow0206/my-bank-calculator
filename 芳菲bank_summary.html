<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全銀行資產負債匯整系統 - 順序調整版</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --asset-color: #27ae60;
            --debt-color: #e74c3c;
            --bg-color: #f4f7f9;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        
        .summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .card { padding: 20px; border-radius: 12px; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bg-assets { background: var(--asset-color); }
        .bg-debts { background: var(--debt-color); }
        .bg-net { background: #3498db; }
        .card h3 { margin: 0; font-size: 16px; opacity: 0.9; }
        .card div { font-size: 24px; font-weight: bold; margin-top: 10px; }

        .section-title { font-size: 20px; font-weight: bold; margin: 25px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary-color); }
        
        .bank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .input-group {
            background: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }
        .input-group label { font-size: 14px; margin-bottom: 5px; color: #555; font-weight: bold; }
        .input-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus { border-color: #3498db; }

        .debt-section { background: #fff5f5; border: 1px solid #feb2b2; padding: 20px; border-radius: 12px; margin-top: 20px; }

        .btn-clear {
            display: block;
            margin: 30px auto 10px;
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-clear:hover { background-color: #7f8c8d; }

        footer { text-align: center; margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 全銀行資產負債整合計算</h1>

    <div class="summary-dashboard">
        <div class="card bg-assets">
            <h3>總存款資產</h3>
            <div id="display-assets">NT$ 0</div>
        </div>
        <div class="card bg-debts">
            <h3>總貸款負債</h3>
            <div id="display-debts">NT$ 0</div>
        </div>
        <div class="card bg-net">
            <h3>淨資產 (存款 - 貸款)</h3>
            <div id="display-net">NT$ 0</div>
        </div>
    </div>

    <div class="section-title">💰 銀行存款項目 (自動存檔)</div>
    <div class="bank-grid" id="asset-inputs"></div>

    <div class="section-title">📉 貸款負債項目</div>
    <div class="debt-section">
        <div class="bank-grid">
            <div class="input-group">
                <label>台灣銀行 (就學貸款)</label>
                <input type="number" id="debt-bot" class="debt-input" placeholder="輸入餘額" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>富邦銀行 (個人信貸)</label>
                <input type="number" id="debt-fubon" class="debt-input" placeholder="輸入餘額" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>其他貸款</label>
                <input type="number" id="debt-others" class="debt-input" placeholder="輸入餘額" oninput="calculate()">
            </div>
        </div>
    </div>

    <button class="btn-clear" onclick="clearAll()">🔄 清空所有數據</button>

    <footer>本網頁僅供個人計算使用，資料儲存於您的瀏覽器快取中。</footer>
</div>

<script>
    // 已按照您的要求調整銀行順序
    const banks = [
        "宥嘉存款", "中國信託", "國泰世華", "台新銀行", "台新子帳號", 
        "富邦銀行", "華南銀行", "台灣銀行", "第一銀行", "郵局", 
        "兆豐銀行", "王道銀行", "元大銀行", "聯邦銀行", "Bankee++", 
        "玉山銀行", "凱基銀行", "line bamk", "新光銀行", "樂天國際銀行", 
        "大戶DAWHO", "HSBC taiwan", "將來銀行", "合作金庫銀行", "台灣企銀", "掌上銀"
    ];

    const assetContainer = document.getElementById('asset-inputs');
    banks.forEach((bank) => {
        const div = document.createElement('div');
        div.className = 'input-group';
        // 使用銀行名稱作為儲存 ID，確保順序調整後資料不遺失
        const safeId = `asset-${bank.replace(/\s+/g, '')}`;
        div.innerHTML = `
            <label>${bank}</label>
            <input type="number" id="${safeId}" class="asset-input" placeholder="0" oninput="calculate()">
        `;
        assetContainer.appendChild(div);
    });

    function calculate() {
        let totalAssets = 0;
        let totalDebts = 0;
        let saveData = { assets: {}, debts: {} };

        document.querySelectorAll('.asset-input').forEach(input => {
            let val = parseFloat(input.value) || 0;
            totalAssets += val;
            saveData.assets[input.id] = input.value;
        });

        document.querySelectorAll('.debt-input').forEach(input => {
            let val = parseFloat(input.value) || 0;
            totalDebts += val;
            saveData.debts[input.id] = input.value;
        });

        const netValue = totalAssets - totalDebts;

        document.getElementById('display-assets').innerText = "NT$ " + totalAssets.toLocaleString();
        document.getElementById('display-debts').innerText = "NT$ " + totalDebts.toLocaleString();
        document.getElementById('display-net').innerText = "NT$ " + netValue.toLocaleString();

        const netCard = document.getElementById('display-net').parentElement;
        netCard.style.background = netValue < 0 ? "#e67e22" : "#3498db";

        localStorage.setItem('bank_data_v3', JSON.stringify(saveData));
    }

    function loadData() {
        const savedJSON = localStorage.getItem('bank_data_v3');
        if (savedJSON) {
            const data = JSON.parse(savedJSON);
            for (let id in data.assets) {
                const el = document.getElementById(id);
                if (el) el.value = data.assets[id];
            }
            for (let id in data.debts) {
                const el = document.getElementById(id);
                if (el) el.value = data.debts[id];
            }
            calculate();
        }
    }

    function clearAll() {
        if (confirm("確定要清空所有已填寫的金額嗎？")) {
            localStorage.removeItem('bank_data_v3');
            document.querySelectorAll('input').forEach(input => input.value = "");
            calculate();
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
